# 与 docs/GO_LIVE_VALIDATION.md §3 门禁一致：lint + production build
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          # Next 构建阶段不调用 OSS/AI 亦可完成编译；缺省占位避免误读本地 .env
          NODE_ENV: production
